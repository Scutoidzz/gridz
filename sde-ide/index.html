<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridz SDE IDE - No-Code Drag & Drop</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">G</div>
            <span style="font-family: 'Outfit', sans-serif;">Gridz SDE IDE</span>
        </div>
        <div class="header-actions">
            <button id="btn-preview">Preview</button>
            <button id="btn-export" class="primary">Export .SDE</button>
        </div>
    </header>

    <main>
        <aside>
            <div class="sidebar-section">
                <h3>UI Components</h3>
                <div class="block-list">
                    <div class="block-item" draggable="true" data-type="label">
                        <span class="block-icon">T</span>
                        <span class="block-name">Label</span>
                    </div>
                    <div class="block-item" draggable="true" data-type="button">
                        <span class="block-icon">▢</span>
                        <span class="block-name">Button</span>
                    </div>
                    <div class="block-item" draggable="true" data-type="rect">
                        <span class="block-icon">█</span>
                        <span class="block-name">Box</span>
                    </div>
                    <div class="block-item" draggable="true" data-type="circle">
                        <span class="block-icon">●</span>
                        <span class="block-name">Circle</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section" style="margin-top: auto;">
                <h3>Project Settings</h3>
                <div class="prop-group">
                    <label>App Name</label>
                    <input type="text" id="app-name" value="My Gridz App">
                </div>
                <div class="prop-group">
                    <label>Icon Color</label>
                    <input type="color" id="app-icon-color" value="#38bdf8">
                </div>
            </div>
        </aside>

        <section class="canvas-container">
            <div id="canvas">
                <!-- Drop zone -->
            </div>
        </section>

        <section class="properties" id="property-panel">
            <h3>Properties</h3>
            <div id="no-selection" style="color: var(--text-secondary); font-size: 0.875rem;">
                Select an element to edit its properties.
            </div>
            <div id="prop-controls" style="display: none; flex-direction: column; gap: 16px;">
                <div class="prop-group">
                    <label>Text / Label</label>
                    <input type="text" id="prop-text">
                </div>
                <div class="prop-group">
                    <label>Position X</label>
                    <input type="number" id="prop-x">
                </div>
                <div class="prop-group">
                    <label>Position Y</label>
                    <input type="number" id="prop-y">
                </div>
                <div class="prop-group">
                    <label>Width</label>
                    <input type="number" id="prop-w">
                </div>
                <div class="prop-group">
                    <label>Height</label>
                    <input type="number" id="prop-h">
                </div>
                <div class="prop-group">
                    <label>Color</label>
                    <input type="color" id="prop-color">
                </div>
                <div class="prop-group">
                    <label>Action (Script)</label>
                    <input type="text" id="prop-action" placeholder="print('clicked')">
                </div>
                <button id="btn-delete" style="margin-top: 10px; color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">Delete Element</button>
            </div>
        </section>
    </main>

    <script type="module" src="./main.js"></script>
</body>
</html>
